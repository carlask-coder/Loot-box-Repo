*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

<script>
function drawPixels(canvas,pixels,palette,scale){
  const rows=pixels.length,cols=pixels[0].length;
  canvas.width=cols*scale;canvas.height=rows*scale;
  const ctx=canvas.getContext("2d");ctx.imageSmoothingEnabled=false;
  pixels.forEach((row,y)=>{[...row].forEach((ch,x)=>{
    const color=palette[ch];if(!color)return;
    ctx.fillStyle=color;ctx.fillRect(x*scale,y*scale,scale,scale);
    ctx.fillStyle="rgba(255,255,255,0.15)";ctx.fillRect(x*scale,y*scale,scale,1);ctx.fillRect(x*scale,y*scale,1,scale);
    ctx.fillStyle="rgba(0,0,0,0.2)";ctx.fillRect(x*scale,(y+1)*scale-1,scale,1);ctx.fillRect((x+1)*scale-1,y*scale,1,scale);
  });});
}
const GIGI_PIX=["....HHHHHHHH....","...HHHHHHHHHH...","..HHHSSSSSSHHH..","..HHSSSSSSSSHH..","..HHSSESSESSHH..","..HHSSSSSSSSHH..","..HHSSSMSSSHH...","..HHHSSSSSSHHH...","...HHHHHHHHHH...",".....SSSSSS.....",".....SSSSSS.....","....PPPPPPPP....","...PPPPPPPPPP...","...PPPPPPPPPP...","...PPPPPPPPPP...","...PPPPPPPPPP....","....PPPPPPPP....","....DDDDDDDD....","....DDDD.DDD....","....DDDD.DDD....","....DDDD.DDD....","....DDDD.DDD....","....FFFF.FFF....","....FFFF.FFF...."];

const GARRETT_PAL={B:"#f0e0b0",S:"#fdd9c0",E:"#5b88c4",M:"#e88878",L:"#3a75b5",G:"#3d5a8a",T:"#4a3520",".":null};

function drawLandscape(){
  const canvas=document.getElementById("landscape");
  const W=canvas.parentElement.clientWidth||460;
  const B=8,H=140;
  canvas.width=W;canvas.height=H;canvas.style.height=H+"px";
  const ctx=canvas.getContext("2d");ctx.imageSmoothingEnabled=false;
  const cols=Math.ceil(W/B),rows=Math.ceil(H/B);
  const sky=["#1a2a5e","#1e3366","#22396e","#264076","#2a477e"];
  for(let r=0;r<rows;r++){ctx.fillStyle=sky[Math.min(Math.floor(r/rows*sky.length),sky.length-1)];ctx.fillRect(0,r*B,W,B);}
  for(let i=0;i<20;i++){ctx.fillStyle="rgba(255,255,255,0.7)";ctx.fillRect(((i*73+11)%cols)*B+3,((i*37+5)%(Math.floor(rows/2)))*B+3,2,2);}
  ctx.fillStyle="#ffeebb";for(let dx=0;dx<3;dx++)for(let dy=0;dy<3;dy++)ctx.fillRect((cols-6+dx)*B,(1+dy)*B,B,B);
  ctx.fillStyle="#22396e";ctx.fillRect((cols-5)*B,B,B,B);
  const mtn=[14,12,10,9,8,10,13,11,9,8,10,12,14,12,10,9,11,13,10,9];
  for(let c=0;c<cols;c++){const mh=mtn[c%mtn.length];for(let r=mh;r<rows-4;r++){ctx.fillStyle=r===mh?"#4a5060":"#363c48";ctx.fillRect(c*B,r*B,B,B);}}
  for(let c=0;c<cols;c++){ctx.fillStyle="#555";ctx.fillRect(c*B,(rows-5)*B,B,B);ctx.fillStyle="#666";ctx.fillRect(c*B,(rows-4)*B,B,B);}
  for(let c=0;c<cols;c++){ctx.fillStyle="#7a5230";ctx.fillRect(c*B,(rows-3)*B,B,B);ctx.fillStyle="#8b5e38";ctx.fillRect(c*B,(rows-2)*B,B,B);}
  for(let c=0;c<cols;c++){ctx.fillStyle=c%2===0?"#4a9f3d":"#3d8c32";ctx.fillRect(c*B,(rows-4)*B,B,B);}
  [2,7,11,16,20,cols-4,cols-9].forEach(tc=>{
    if(tc<0||tc>=cols-2)return;const gr=rows-4;
    ctx.fillStyle="#6b4423";ctx.fillRect(tc*B,(gr-2)*B,B,B*2);
    for(let lx=-1;lx<=1;lx++)for(let ly=-3;ly<=-1;ly++){ctx.fillStyle=((lx+ly)%2===0)?"#2d7a20":"#3a9030";ctx.fillRect((tc+lx)*B,(gr+ly)*B,B,B);}
    ctx.fillStyle="#3a9030";ctx.fillRect(tc*B,(gr-4)*B,B,B);
  });
  [[4,rows-5,"#ff5555"],[9,rows-5,"#ff88aa"],[14,rows-5,"#ffdd44"],[18,rows-5,"#ff5555"]].forEach(([c,r,col])=>{if(c<cols){ctx.fillStyle=col;ctx.fillRect(c*B+2,r*B+2,B-4,B-4);}});
  ctx.strokeStyle="rgba(0,0,0,0.07)";ctx.lineWidth=.5;
  for(let c=0;c<=cols;c++){ctx.beginPath();ctx.moveTo(c*B,0);ctx.lineTo(c*B,H);ctx.stroke();}
  for(let r=0;r<=rows;r++){ctx.beginPath();ctx.moveTo(0,r*B);ctx.lineTo(W,r*B);ctx.stroke();}
  const scene=document.getElementById("scene");
  scene.style.height=H+"px";scene.style.marginTop="-"+H+"px";scene.style.position="relative";
}

const PCOLS=["#ffd040","#7ec850","#ff6b6b","#6bbbff","#ff6bff","#40ffc0","#ffaa40","#fff","#ff4444","#44ff88"];
function spawnParticles(){
  const btn=document.getElementById("main-btn");const r=btn.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<24;i++){
    const p=document.createElement("div");p.className="particle";
    p.style.background=PCOLS[Math.floor(Math.random()*PCOLS.length)];
    p.style.left=cx+"px";p.style.top=cy+"px";document.body.appendChild(p);
    const vx=(Math.random()-.5)*200,vy=-(Math.random()*140+70);const start=Date.now();
    const tick=()=>{const t=(Date.now()-start)/1000;if(t>1){p.remove();return;}
      p.style.left=(cx+vx*t)+"px";p.style.top=(cy+vy*t+110*t*t)+"px";p.style.opacity=1-t;requestAnimationFrame(tick);};
    requestAnimationFrame(tick);
  }
}
function triggerAnim(){
  spawnParticles();
  ["gigi","garrett"].forEach(id=>{const el=document.getElementById(id);el.classList.remove("jumping","glowing");void el.offsetWidth;el.classList.add("jumping","glowing");setTimeout(()=>el.classList.remove("jumping","glowing"),600);});
  ["chewy","marsh","anakin"].forEach((id,i)=>{const el=document.getElementById(id);setTimeout(()=>{el.classList.remove("catjump");void el.offsetWidth;el.classList.add("catjump");setTimeout(()=>el.classList.remove("catjump"),600);},i*80);});
  const lid=document.getElementById("chest-lid"),glow=document.getElementById("chest-glow");
  lid.style.transform="perspective(80px) rotateX(-55deg)";lid.style.top="-4px";glow.style.display="block";
  setTimeout(()=>{lid.style.transform="";lid.style.top="18px";glow.style.display="none";},700);
}

let missions=[],revealed=0;
const THEMES=[
  {bg:"#0a1f0a",b:"#4a9f3d",a:"#7ec850",ic:"&#127807;"},
  {bg:"#0a0a1f",b:"#5555ff",a:"#9999ff",ic:"&#128142;"},

  {bg:"#1f140a",b:"#8b4513",a:"#d4834a",ic:"&#129683;"},
];
function renderMissions(){
  const container=document.getElementById("missions");container.innerHTML="";
  missions.forEach((m,i)=>{
    const t=THEMES[i%THEMES.length];const div=document.createElement("div");
    div.className="card"+(i<revealed?" revealed":"");
    if(i<revealed){
      div.style.background=t.bg;div.style.borderColor=t.b;
      div.style.boxShadow="3px 3px 0 #000";
      const lines=m.split("\n").filter(Boolean);
      let html=`<div class="card-title" style="color:${t.a}">${t.ic} ${lines[0]||""}</div>`;
      html+=`<div class="card-class" style="color:${t.b}">${lines[1]||""}</div>`;
      lines.slice(2).forEach(s=>{const clean=s.toLowerCase().includes("clean-up");html+=`<div class="step${clean?" cleanup":""}">${s}</div>`;});
      div.innerHTML=html;
    } else {
      div.innerHTML=`<div class="card-locked"><span>&#128274;</span><span>MISSION ${i+1} &mdash; LOCKED</span></div>`;
    }
    container.appendChild(div);
  });
  if(revealed>0){const cards=container.querySelectorAll(".card");if(cards[revealed-1])cards[revealed-1].scrollIntoView({behavior:"smooth",block:"nearest"});}
}
function updateChest(){
  const area=document.getElementById("chest-area"),bar=document.getElementById("chest-bar"),counter=document.getElementById("chest-counter");
  if(missions.length>0){
    area.style.display="flex";bar.style.width=(revealed/missions.length*100)+"%";
    const done=revealed>=missions.length;
    counter.textContent=done?"ALL UNLOCKED!":revealed+" / "+missions.length+" OPENED";
    counter.style.color=done?"#ffd040":"#7ec850";
  } else {area.style.display="none";}
}
function updateBtn(){
  const btn=document.getElementById("main-btn");
  if(missions.length===0){btn.innerHTML="&#128272; GET LOOT BOX";btn.className="btn btn-gold";}
  else if(revealed>=missions.length){btn.innerHTML="&#128260; NEW LOOT BOX";btn.className="btn btn-grey";document.getElementById("briefing-end").style.display="block";}
  else{btn.innerHTML="&#128230; OPEN MISSION "+(revealed+1);btn.className="btn btn-green";document.getElementById("briefing-end").style.display="none";}
}
async function fetchMissions(){
  const btn=document.getElementById("main-btn");
  btn.innerHTML="&#9203; LOADING...";btn.className="btn btn-grey";btn.disabled=true;
  document.getElementById("error-box").style.display="none";
  document.getElementById("briefing-end").style.display="none";
  missions=[];revealed=0;renderMissions();updateChest();
  try{
