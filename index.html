  canvas.width=W; canvas.height=H; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.imageSmoothingEnabled=false;
  const cols=Math.ceil(W/B),rows=Math.ceil(H/B);
  // Night sky
  const sky=['#0d1a3a','#111f44','#15254e','#192a58'];
  for(let r=0;r<rows;r++){ctx.fillStyle=sky[Math.min(Math.floor(r/rows*sky.length),sky.length-1)];ctx.fillRect(0,r*B,W,B);}

  for(let c=0;c<cols;c++){ctx.fillStyle='#7a5230';ctx.fillRect(c*B,(rows-2)*B,B,B*2);}

const LEVELS=[
  {name:"ROOKIE\nAGENT",xp:0,icon:"🥚"},
  {name:"JUNIOR\nAGENT",xp:5,icon:"🌱"},
  {name:"FIELD\nAGENT",xp:15,icon:"⚡"},

  {name:"LEGEND\nAGENT",xp:200,icon:"🏆"},
  {name:"CEO\nLEGEND",xp:999,icon:"🎯"},
];

function getProgress(){
  try{
    const d=JSON.parse(localStorage.getItem('ceo-progress')||'{}');
    if(!d.totalXP) d.totalXP=0;
    if(!d.streak) d.streak=0;
    if(!d.lastDate) d.lastDate='';
    if(!d.completed) d.completed=0;
    return d;
  }catch(e){return{totalXP:0,streak:0,lastDate:'',completed:0};}
}

function saveProgress(p){
  try{localStorage.setItem('ceo-progress',JSON.stringify(p));}catch(e){}
}

function getLevel(xp){
  for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp)return i;}
  return 0;
}

function checkStreak(){
  const p=getProgress();
  const today=new Date().toDateString();
  if(p.lastDate===today) return p;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(p.lastDate===yesterday){p.streak++;} else {p.streak=1;}
  p.lastDate=today;
  saveProgress(p);
  return p;
}

function awardXP(amount){
  const p=getProgress();
  const oldLevel=getLevel(p.totalXP);
  p.totalXP+=amount;
  p.completed++;
  saveProgress(p);
  const newLevel=getLevel(p.totalXP);
  if(newLevel>oldLevel){
    // Level up!
    const box=document.getElementById('level-box');
    if(box){box.classList.remove('level-up-anim');void box.offsetWidth;box.classList.add('level-up-anim');}
    soundLevelUp();setTimeout(()=>showLevelUpToast(LEVELS[newLevel]),200);
  }
  updateHUD();
}

function showLevelUpToast(level){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:99999;background:#0a140a;border:4px solid #ffd040;padding:20px 28px;text-align:center;box-shadow:6px 6px 0 #000;transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);';
  t.innerHTML=`<div style="font-size:32px;margin-bottom:8px">${level.icon}</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:7px;color:#ffd040;line-height:2;">LEVEL UP!</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:9px;color:#fff;line-height:2;margin-top:4px;">${level.name.replace('\n',' ')}</div>`;
  document.body.appendChild(t);
  setTimeout(()=>t.style.transform='translate(-50%,-50%) scale(1)',50);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.5s';setTimeout(()=>t.remove(),500);},2500);
}

function updateHUD(){
  const p=checkStreak();
  const lvlIdx=getLevel(p.totalXP);
  const lvl=LEVELS[lvlIdx];
  const nextLvl=LEVELS[Math.min(lvlIdx+1,LEVELS.length-1)];
  const xpInLevel=p.totalXP-lvl.xp;
  const xpNeeded=nextLvl.xp-lvl.xp;
  const pct=lvlIdx>=LEVELS.length-1?100:Math.min(100,Math.round(xpInLevel/xpNeeded*100));

  const sc=document.getElementById('streak-count');
  const sl=document.getElementById('streak-label');
  const si=document.getElementById('streak-icon');
  const ln=document.getElementById('level-name');
  const li=document.getElementById('level-icon');
  const lx=document.getElementById('level-xp');
  const xb=document.getElementById('xp-bar');

  if(sc) sc.textContent=p.streak+' DAY'+(p.streak!==1?'S':'');
  if(sl) sl.textContent='STREAK';
  if(si) si.textContent=p.streak>=7?'🔥':p.streak>=3?'⚡':'📅';
  if(ln) ln.innerHTML=lvl.name.replace('\n','<br>');
  if(li) li.textContent=lvl.icon;
  if(lx) lx.textContent=lvlIdx>=LEVELS.length-1?'MAX LEVEL':p.totalXP+' / '+nextLvl.xp+' XP';
  if(xb) xb.style.width=pct+'%';
}

let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playTone(freq,dur,type='square',vol=0.15,detune=0){
  try{
    const ctx=getAudio();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime);
    o.detune.setValueAtTime(detune,ctx.currentTime);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);
  }catch(e){}
}

  try{
    const ctx=getAudio();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';
    o.frequency.setValueAtTime(200,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(600,ctx.currentTime+0.15);
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.25);
  }catch(e){}
}
function soundCat(){
  // Cat bounce — meow-ish
  try{
    const ctx=getAudio();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(400,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(300,ctx.currentTime+0.2);
    g.gain.setValueAtTime(0.08,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.25);
  }catch(e){}
}
